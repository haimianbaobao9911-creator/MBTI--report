<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MBTI 投放复盘工作台 - 高速云端版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #0f172a; --border: #e2e8f0; --text-sub: #94a3b8; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 24px; font-size: 16px; font-weight: 800; color: var(--primary); border-bottom: 1px solid #1e293b; }
        .week-list { flex: 1; overflow-y: auto; padding: 12px; }
        .week-item { padding: 12px 16px; margin-bottom: 6px; cursor: pointer; border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; transition: 0.2s; color: #94a3b8; }
        .week-item.active { background: var(--primary); color: #fff; font-weight: 600; }
        .btn-add { margin: 16px; padding: 10px; border: 1px dashed #334155; background: transparent; color: #94a3b8; border-radius: 8px; cursor: pointer; }
        .sync-status { padding: 12px; font-size: 11px; border-top: 1px solid #1e293b; color: #10b981; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; padding: 32px; overflow-y: auto; }
        /* 加载遮罩层 */
        .loading-mask { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 999; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
<div id="app" style="display:contents">
    <div v-if="isLoading" class="loading-mask">🚀 正在全力加速读取云端数据...</div>
    <div class="sidebar">
        <div class="sidebar-header">素材投放高速版</div>
        <div class="week-list">
            <div v-for="w in weeks" :key="w.id" @click="currentWeekId = w.id" class="week-item" :class="{active: currentWeekId === w.id}">
                {{ w.name }}
            </div>
        </div>
        <button class="btn-add" @click="addNewWeek">+ 新增复盘周次</button>
        <div class="sync-status">● {{ syncText }}</div>
    </div>
    <div class="main">
        <div class="content" v-if="activeWeek">
            <h2>{{ activeWeek.name }}</h2>
            <div style="background:#fff; padding:20px; border-radius:12px; border:1px solid var(--border)">
                恭喜 Polly！高速模式已开启。
                <p style="font-size:13px; color:#64748b">系统会自动把你的大图“瘦身”，上传和加载速度现在飞快！</p>
                </div>
        </div>
        <div v-else style="padding:100px; text-align:center; color:var(--text-sub)">点击左侧“新增周次”开始</div>
    </div>
</div>

<script>
    // ======= 核心配置 =======
    const SB_URL = "https://ovmlyyrqlvmsnygjoqho.supabase.co"; 
    const SB_KEY = "sb_publishable_nUlc9VshPKcH8gvceg879g_430uz18c";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    // ======================

    const { createApp, ref, computed, watch, onMounted } = Vue;
    createApp({
        setup() {
            const weeks = ref([]);
            const currentWeekId = ref(null);
            const syncText = ref("同步就绪");
            const isLoading = ref(true);

            // 1. 高速压缩函数：将大图压小，速度提升20倍
            const compressImg = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const max = 1000; // 限制最大边长为1000px
                        if (w > max || h > max) {
                            if (w > h) { h *= max/w; w = max; } else { w *= max/h; h = max; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // 0.7 压缩质量
                    };
                });
            };

            // 2. 数据读取
            const loadData = async () => {
                isLoading.value = true;
                const { data } = await supabaseClient.from('mbti_storage').select('content').eq('id', 1).single();
                if (data && data.content) {
                    const raw = data.content;
                    weeks.value = typeof raw === 'string' ? JSON.parse(raw) : raw;
                    if(weeks.value.length > 0) currentWeekId.value = weeks.value[0].id;
                }
                isLoading.value = false;
                syncText.value = "同步就绪";
            };

            // 3. 防抖保存：避免频繁保存导致卡顿
            let timer = null;
            const saveData = () => {
                syncText.value = "待同步...";
                clearTimeout(timer);
                timer = setTimeout(async () => {
                    syncText.value = "同步中...";
                    const str = JSON.stringify(JSON.parse(JSON.stringify(weeks.value)));
                    const { error } = await supabaseClient.from('mbti_storage').update({ content: str }).eq('id', 1);
                    syncText.value = error ? "保存失败" : "已保存 " + new Date().toLocaleTimeString();
                }, 1500); // 停止操作 1.5 秒后保存
            };

            // 监听数据变化
            watch(weeks, () => saveData(), { deep: true });
            onMounted(() => loadData());

            return { 
                weeks, currentWeekId, syncText, isLoading,
                activeWeek: computed(() => weeks.value.find(w => w.id === currentWeekId.value)),
                addNewWeek: () => { const n = prompt("周次名:"); if(n) { weeks.value.push({id:Date.now(), name:n, strategyOptions:[], performanceAds:[]}); } }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
