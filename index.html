<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MBTI 投放复盘云端工作台 Pro - 高速版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #0f172a; --border: #e2e8f0; --text-sub: #94a3b8; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 24px; font-size: 16px; font-weight: 800; color: var(--primary); border-bottom: 1px solid #1e293b; }
        .week-list { flex: 1; overflow-y: auto; padding: 12px; }
        .week-item { padding: 12px 16px; margin-bottom: 6px; cursor: pointer; border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; color: #94a3b8; transition: 0.2s; }
        .week-item.active { background: var(--primary); color: #fff; font-weight: 600; }
        .btn-add { margin: 16px; padding: 10px; border: 1px dashed #334155; background: transparent; color: #94a3b8; border-radius: 8px; cursor: pointer; }
        .sync-status { padding: 12px; font-size: 11px; border-top: 1px solid #1e293b; color: #10b981; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { background: #fff; padding: 0 40px; display: flex; gap: 40px; border-bottom: 1px solid var(--border); height: 64px; align-items: center; }
        .tab { height: 100%; display: flex; align-items: center; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; font-size: 15px; }
        .tab.active { color: var(--primary); border-color: var(--primary); font-weight: 600; }
        .content { flex: 1; padding: 32px; overflow-y: auto; padding-bottom: 150px; }
        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .item-header { display: flex; align-items: center; gap: 16px; padding: 16px 24px; }
        .title-input { border: 1px solid transparent; font-size: 16px; font-weight: 600; width: 100%; padding: 4px; outline: none; }
        .vote-tag { background: #f1f5f9; border-radius: 6px; display: flex; align-items: center; padding: 4px; gap: 8px; }
        .vote-btn { width: 24px; height: 24px; background: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .vote-num { color: var(--primary); font-weight: 800; min-width: 24px; text-align: center; }
        .img-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .img-wrapper { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: zoom-in; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .img-remove { position: absolute; top: 4px; right: 4px; background: rgba(239, 68, 68, 0.8); color: #fff; border-radius: 50%; border: none; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 20px; text-align: center; color: #64748b; cursor: pointer; background: #fff; font-size: 12px; flex: 1; min-width: 150px; }
        .drop-zone.dragging { border-color: var(--primary); background: #eef2ff; }
        .footer { position: fixed; bottom: 0; left: 240px; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 20px 40px; border-top: 1px solid var(--border); display: flex; gap: 16px; }
        .footer-input { border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 14px; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 4px; }
    </style>
</head>
<body>
<div id="app" style="display:contents">
    <div v-if="previewUrl" class="lightbox" @click="previewUrl = null"><img :src="previewUrl"></div>
    <div class="sidebar">
        <div class="sidebar-header">素材投放复盘系统</div>
        <div class="week-list">
            <div v-for="w in weeks" :key="w.id" @click="currentWeekId = w.id" class="week-item" :class="{active: currentWeekId === w.id}">
                <span>{{ w.name }}</span>
            </div>
        </div>
        <button class="btn-add" @click="addNewWeek">+ 新增复盘周次</button>
        <div class="sync-status">● {{ syncText }}</div>
    </div>
    <div class="main">
        <div class="tabs">
            <div class="tab" :class="{active: currentTab === 'strategy'}" @click="currentTab = 'strategy'">💡 策略脑暴池</div>
            <div class="tab" :class="{active: currentTab === 'performance'}" @click="currentTab = 'performance'">🚀 消耗排行榜</div>
        </div>
        <div class="content" v-if="activeWeek">
            <div v-show="currentTab === 'strategy'">
                <div v-for="item in sortedOptions" :key="item.id" class="item-card">
                    <div class="item-header">
                        <div style="flex:1">
                            <input class="title-input" v-model="item.title" @change="saveData">
                            <div style="font-size:12px; color:#64748b; cursor:pointer" @click="item.showNote = !item.showNote">
                                {{ item.showNote ? '收起详情 ▲' : '编辑详情与图片 (' + (item.images?.length || 0) + ') ▼' }}
                            </div>
                        </div>
                        <div class="vote-tag">
                            <button class="vote-btn" @click="changeVote(item.id, -1)">-</button>
                            <span class="vote-num">{{ item.votes }}</span>
                            <button class="vote-btn" @click="changeVote(item.id, 1)">+</button>
                        </div>
                    </div>
                    <div v-if="item.showNote" style="padding: 20px; border-top: 1px solid #f1f5f9;">
                        <textarea class="footer-input" style="width:100%; height:80px; margin-bottom:10px" v-model="item.note" @change="saveData" placeholder="录入核心逻辑..."></textarea>
                        <div class="img-list">
                            <div v-for="(src, idx) in item.images" class="img-wrapper" @click="previewUrl = src">
                                <img :src="src">
                                <button class="img-remove" @click.stop="item.images.splice(idx,1);saveData()">✕</button>
                            </div>
                            <div class="drop-zone" :class="{dragging: dragOverId==='st'+item.id}" @click="triggerUpload('st', item.id)" @paste="onPaste($event, 'st', item.id)" @dragover.prevent="dragOverId='st'+item.id" @dragleave="dragOverId=null" @drop.prevent="onDrop($event, 'st', item.id)">
                                📸 点击、粘贴或拖拽图片
                                <input type="file" :id="'file-st-'+item.id" style="display:none" @change="handleFile($event, 'st', item.id)" multiple>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        <div class="footer" v-if="activeWeek && currentTab==='strategy'">
            <input v-model="userInput" @keyup.enter="handleCommand" placeholder="输入序号加票或新策略标题..." class="footer-input" style="flex:1">
            <button class="btn-main" @click="handleCommand">提交需求</button>
        </div>
    </div>
</div>

<script>
    // ======= 核心：在这里填入你的钥匙 =======
    const SB_URL = "https://ovmlyyrqlvmsnygjoqho.supabase.co"; 
    const SB_KEY = "sb_publishable_nUlc9VshPKcH8gvceg879g_430uz18c";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    // =====================================

    const { createApp, ref, computed, watch, onMounted } = Vue;
    createApp({
        setup() {
            const weeks = ref([]);
            const currentWeekId = ref(null);
            const currentTab = ref('strategy');
            const syncText = ref("同步就绪");
            const userInput = ref("");
            const previewUrl = ref(null);
            const dragOverId = ref(null);
            const presetTitles = ["排名榜", "反应记录", "天赋测试", "KOL口播", "人格成长", "MBTI配对", "MBTI与疾病", "职业与收入", "社会关系"];

            const compressImg = (base64) => new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 1000; if (w > max || h > max) { if (w > h) { h *= max/w; w = max; } else { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.7));
                };
            });

            const loadData = async () => {
                const { data } = await supabaseClient.from('mbti_storage').select('content').eq('id', 1).single();
                if (data && data.content) {
                    weeks.value = typeof data.content === 'string' ? JSON.parse(data.content) : data.content;
                    if(weeks.value.length > 0) currentWeekId.value = weeks.value[0].id;
                }
            };

            let timer = null;
            const saveData = () => {
                syncText.value = "同步中..."; clearTimeout(timer);
                timer = setTimeout(async () => {
                    const str = JSON.stringify(JSON.parse(JSON.stringify(weeks.value)));
                    await supabaseClient.from('mbti_storage').update({ content: str }).eq('id', 1);
                    syncText.value = "已保存 " + new Date().toLocaleTimeString();
                }, 1000);
            };

            const processImages = async (files, type, id) => {
                for (let file of files) {
                    if (file.type.indexOf('image') === -1) continue;
                    const reader = new FileReader();
                    reader.onload = async (r) => {
                        const compressed = await compressImg(r.target.result);
                        const item = activeWeek.value.strategyOptions.find(o => o.id === id);
                        if(item) { if(!item.images) item.images = []; item.images.push(compressed); saveData(); }
                    };
                    reader.readAsDataURL(file);
                }
            };

            onMounted(() => loadData());
            const activeWeek = computed(() => weeks.value.find(w => w.id === currentWeekId.value));

            return { 
                weeks, currentWeekId, currentTab, syncText, userInput, previewUrl, dragOverId, saveData,
                activeWeek, sortedOptions: computed(() => activeWeek.value ? [...activeWeek.value.strategyOptions].sort((a,b) => b.votes - a.votes) : []),
                addNewWeek: () => { const n = prompt("周次:"); if(n) { const id = Date.now(); weeks.value.push({id, name:n, strategyOptions: presetTitles.map((t,i)=>({id:'st'+id+i, index:i+1, title:t, votes:0, note:"", images:[], showNote:false})), performanceAds:[]}); saveData(); } },
                handleCommand: () => {
                    const val = userInput.value.trim(); if(!val) return;
                    const target = activeWeek.value.strategyOptions.find(o => o.index === parseInt(val));
                    if(target) target.votes++;
                    else activeWeek.value.strategyOptions.push({id:Date.now(), index:activeWeek.value.strategyOptions.length+1, title:val, votes:1, note:"", images:[], showNote:false});
                    userInput.value = ""; saveData();
                },
                changeVote: (id, d) => { const t = activeWeek.value.strategyOptions.find(o => o.id === id); if(t) { t.votes = Math.max(0, t.votes + d); saveData(); } },
                triggerUpload: (type, id) => document.getElementById(`file-${type}-${id}`).click(),
                handleFile: (e, type, id) => processImages(Array.from(e.target.files), type, id),
                onPaste: (e, type, id) => processImages(Array.from(e.clipboardData.items).filter(i=>i.type.indexOf('image')!==-1).map(i=>i.getAsFile()), type, id),
                onDrop: (e, type, id) => { dragOverId.value = null; processImages(Array.from(e.dataTransfer.files), type, id); }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
