<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MBTI 投放复盘云端工作台 (Supabase 版)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 这里保留你之前的 CSS 样式，由于字数限制我略写，请确保复制你之前的完整 style */
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #0f172a; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; padding: 32px; overflow-y: auto; }
        .sync-status { padding: 10px; font-size: 12px; border-top: 1px solid #334155; }
        /* ... 其他样式建议保持和你之前的 index.html 一致 ... */
    </style>
</head>
<body>
<div id="app" style="display:contents">
    <div class="sidebar">
        <div style="padding:24px; font-weight:800; color:var(--primary)">MBTI 云端工作台</div>
        <div style="flex:1; padding:12px">
            <div v-for="w in weeks" :key="w.id" @click="currentWeekId = w.id" style="padding:10px; cursor:pointer" :style="{color: currentWeekId===w.id?'#fff':'#94a3b8'}">{{w.name}}</div>
            <button @click="addNewWeek" style="width:100%; margin-top:10px">+ 新增周次</button>
        </div>
        <div class="sync-status">状态: {{ syncText }}</div>
    </div>
    <div class="main">
        <div class="content" v-if="activeWeek">
            <h2>{{ activeWeek.name }} - 请开始录入数据</h2>
            <button @click="saveData" class="btn-main">手动强制同步</button>
        </div>
    </div>
</div>

<script>
    // --- 配置区：填入你的 Supabase 信息 ---
    const SB_URL = "https://ovmlyyrqlvmsnygjoqho.supabase.co";
    const SB_KEY = "sb_publishable_nUlc9VshPKcH8gvceg879g_430uz18c";
    const supabase = Supabase.createClient(SB_URL, SB_KEY);
    // ------------------------------------

    const { createApp, ref, computed, watch, onMounted } = Vue;
    createApp({
        setup() {
            const weeks = ref([]);
            const currentWeekId = ref(null);
            const syncText = ref("同步中...");

            // 从云端读取数据
            const loadData = async () => {
                const { data, error } = await supabase.from('mbti_storage').select('content').eq('id', 1).single();
                if (data) {
                    weeks.value = data.content || [];
                    if(weeks.value.length > 0) currentWeekId.value = weeks.value[0].id;
                    syncText.value = "云端已就绪";
                } else if (error) {
                    syncText.value = "初始化云端...";
                    await supabase.from('mbti_storage').insert([{ id: 1, content: [] }]);
                }
            };

            // 保存数据
            const saveData = async () => {
                syncText.value = "同步中...";
                const { error } = await supabase.from('mbti_storage').update({ content: weeks.value }).eq('id', 1);
                syncText.value = error ? "保存失败" : "已同步 " + new Date().toLocaleTimeString();
            };

            // 监听变化自动保存
            watch(weeks, () => saveData(), { deep: true });

            onMounted(() => loadData());

            return { 
                weeks, currentWeekId, syncText, saveData,
                activeWeek: computed(() => weeks.value.find(w => w.id === currentWeekId.value)),
                addNewWeek: () => { 
                    const n = prompt("周次名:"); 
                    if(n) { weeks.value.push({id: Date.now(), name: n, strategyOptions: [], performanceAds: []}); } 
                }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
